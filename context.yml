# Generated context file
# Includes st.clab.yml, configs/fabric/*.cfg, configs/cluster/*.yaml, testing/*.yaml, and setup-kind-ips.sh

st_clab:
|
  # Copyright 2020 Nokia
  # Licensed under the BSD 3-Clause License.
  # SPDX-License-Identifier: BSD-3-Clause
  
  name: st # short for streaming telemetry ;)
  prefix: ""
  
  mgmt:
    network: st
    ipv4-subnet: 172.80.80.0/24
  
  topology:
    defaults:
      kind: nokia_srlinux
  
    kinds:
      nokia_srlinux:
        image: ghcr.io/nokia/srlinux:24.10.1
        type: ixr-d2l
      linux:
        image: ghcr.io/srl-labs/network-multitool
  
    nodes:
      ### SPINES ###
      spine1:
        type: ixr-d3l
        group: spine
        startup-config: configs/fabric/spine1.cfg
        mgmt-ipv4: 172.80.80.21
      spine2:
        type: ixr-d3l
        group: spine
        startup-config: configs/fabric/spine2.cfg
        mgmt-ipv4: 172.80.80.22
  
      ### LEAFS ###
      leaf1:
        startup-config: configs/fabric/leaf1.cfg
        mgmt-ipv4: 172.80.80.11
        group: leaf
      leaf2:
        startup-config: configs/fabric/leaf2.cfg
        mgmt-ipv4: 172.80.80.12
        group: leaf
      leaf3:
        startup-config: configs/fabric/leaf3.cfg
        mgmt-ipv4: 172.80.80.13
        group: leaf
  
      ### CLIENTS (Retained) ###
      client1:
        kind: linux
        mgmt-ipv4: 172.80.80.31
        exec:
          - ip address add 172.17.0.1/24 dev eth1
          - ip -6 address add 2002::172:17:0:1/96 dev eth1
          - iperf3 -s -p 5201 -D > iperf3_1.log
          - iperf3 -s -p 5202 -D > iperf3_2.log
        group: server
      client2:
        kind: linux
        mgmt-ipv4: 172.80.80.32
        binds:
          - configs/client2:/config
        exec:
          - ip address add 172.17.0.2/24 dev eth1
          - ip -6 address add 2002::172:17:0:2/96 dev eth1
        group: server
      client3:
        kind: linux
        mgmt-ipv4: 172.80.80.33
        binds:
          - configs/client3:/config
        exec:
          - ip address add 172.17.0.3/24 dev eth1
          - ip -6 address add 2002::172:17:0:3/96 dev eth1
        group: server
  
      ### KIND CLUSTER 1 (Attached to Leaf 1) ###
      c1-control-plane: { kind: ext-container }
      c1-worker:        { kind: ext-container }
      c1-worker2:       { kind: ext-container }
  
      ### KIND CLUSTER 2 (Attached to Leaf 2) ###
      c2-control-plane: { kind: ext-container }
      c2-worker:        { kind: ext-container }
      c2-worker2:       { kind: ext-container }
  
      ### KIND CLUSTER 3 (Attached to Leaf 3) ###
      c3-control-plane: { kind: ext-container }
      c3-worker:        { kind: ext-container }
      c3-worker2:       { kind: ext-container }
  
      ### TELEMETRY STACK ###
      gnmic:
        kind: linux
        mgmt-ipv4: 172.80.80.41
        image: ghcr.io/openconfig/gnmic:0.39.1
        binds:
          - configs/gnmic/gnmic-config.yml:/gnmic-config.yml:ro
        cmd: --config /gnmic-config.yml --log subscribe
        group: "10" 
  
      prometheus:
        kind: linux
        mgmt-ipv4: 172.80.80.42
        image: quay.io/prometheus/prometheus:v2.54.1
        binds:
          - configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        cmd: --config.file=/etc/prometheus/prometheus.yml
        ports:
          - 9090:9090
        group: "10"
  
      grafana:
        kind: linux
        mgmt-ipv4: 172.80.80.43
        image: grafana/grafana:11.2.0
        binds:
          - configs/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yaml:ro
          - configs/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
          - configs/grafana/dashboards:/var/lib/grafana/dashboards
        ports:
          - 3000:3000
        env:
          GF_INSTALL_PLUGINS: "andrewbmchugh-flow-panel"
          GF_ORG_ROLE: "Admin"
          GF_ORG_NAME: "Main Org"
          GF_AUTH_ANONYMOUS_ENABLED: "true"
          GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
          GF_AUTH_ANONYMOUS: "true"
          GF_AUTH_OAUTH_AUTO_LOGIN: "true"
        group: "10"
  
      ### LOGGING STACK ###
      promtail:
        kind: linux
        mgmt-ipv4: 172.80.80.45
        image: grafana/promtail:3.2.0
        binds:
          - configs/promtail:/etc/promtail
        cmd: --config.file=/etc/promtail/promtail-config.yml
        ports:
          - 9080:9080
  
      loki:
        kind: linux
        mgmt-ipv4: 172.80.80.46
        image: grafana/loki:3.2.0
        binds:
          - configs/loki:/etc/loki
        cmd: --config.file=/etc/loki/loki-config.yml
        ports:
          - 3100:3100
  
    links:
      # Spine to Leaf Fabric
      - endpoints: ["spine1:e1-1", "leaf1:e1-49"]
      - endpoints: ["spine1:e1-2", "leaf2:e1-49"]
      - endpoints: ["spine1:e1-3", "leaf3:e1-49"]
      - endpoints: ["spine2:e1-1", "leaf1:e1-50"]
      - endpoints: ["spine2:e1-2", "leaf2:e1-50"]
      - endpoints: ["spine2:e1-3", "leaf3:e1-50"]
      
      # Original Clients
      - endpoints: ["leaf1:e1-1", "client1:eth1"]
      - endpoints: ["leaf2:e1-1", "client2:eth1"]
      - endpoints: ["leaf3:e1-1", "client3:eth1"]
  
      # Kind Cluster 1 Links (Leaf 1)
      - endpoints: ["leaf1:e1-2", "c1-control-plane:eth1"]
      - endpoints: ["leaf1:e1-3", "c1-worker:eth1"]
      - endpoints: ["leaf1:e1-4", "c1-worker2:eth1"]
  
      # Kind Cluster 2 Links (Leaf 2)
      - endpoints: ["leaf2:e1-2", "c2-control-plane:eth1"]
      - endpoints: ["leaf2:e1-3", "c2-worker:eth1"]
      - endpoints: ["leaf2:e1-4", "c2-worker2:eth1"]
  
      # Kind Cluster 3 Links (Leaf 3)
      - endpoints: ["leaf3:e1-2", "c3-control-plane:eth1"]
      - endpoints: ["leaf3:e1-3", "c3-worker:eth1"]
      - endpoints: ["leaf3:e1-4", "c3-worker2:eth1"]

fabric_configs:
  leaf1.cfg:
|
  # uplink interfaces
  set / interface ethernet-1/49 admin-state enable
  set / interface ethernet-1/49 subinterface 0 admin-state enable
  set / interface ethernet-1/49 subinterface 0 ip-mtu 9000
  set / interface ethernet-1/49 subinterface 0 ipv4 admin-state enable
  set / interface ethernet-1/49 subinterface 0 ipv4 address 192.168.11.0/31
  set / interface ethernet-1/50 admin-state enable
  set / interface ethernet-1/50 subinterface 0 admin-state enable
  set / interface ethernet-1/50 subinterface 0 ip-mtu 9000
  set / interface ethernet-1/50 subinterface 0 ipv4 admin-state enable
  set / interface ethernet-1/50 subinterface 0 ipv4 address 192.168.12.0/31
  
  # downlink interfaces (Client 1)
  set / interface ethernet-1/1 admin-state enable
  set / interface ethernet-1/1 subinterface 0 type bridged
  set / interface ethernet-1/1 subinterface 0 admin-state enable
  
  # downlink interfaces (Kind Cluster 1)
  set / interface ethernet-1/2 admin-state enable
  set / interface ethernet-1/2 subinterface 0 type bridged
  set / interface ethernet-1/2 subinterface 0 admin-state enable
  set / interface ethernet-1/3 admin-state enable
  set / interface ethernet-1/3 subinterface 0 type bridged
  set / interface ethernet-1/3 subinterface 0 admin-state enable
  set / interface ethernet-1/4 admin-state enable
  set / interface ethernet-1/4 subinterface 0 type bridged
  set / interface ethernet-1/4 subinterface 0 admin-state enable
  
  # system interface configuration
  set / interface system0 admin-state enable
  set / interface system0 subinterface 0 admin-state enable
  set / interface system0 subinterface 0 ipv4 admin-state enable
  set / interface system0 subinterface 0 ipv4 address 10.0.1.1/32
  
  # associating interfaces with net-ins default
  set / network-instance default ip-forwarding receive-ipv4-check false
  set / network-instance default interface ethernet-1/49.0
  set / network-instance default interface ethernet-1/50.0
  set / network-instance default interface system0.0
  
  # BGP configuration
  set / network-instance default protocols bgp admin-state enable
  set / network-instance default protocols bgp autonomous-system 101
  set / network-instance default protocols bgp router-id 10.0.1.1
  set / network-instance default protocols bgp ebgp-default-policy import-reject-all false
  set / network-instance default protocols bgp ebgp-default-policy export-reject-all false
  set / network-instance default protocols bgp group eBGP export-policy [ export-local ]
  set / network-instance default protocols bgp group eBGP afi-safi ipv4-unicast admin-state enable
  set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
  set / network-instance default protocols bgp afi-safi ipv4-unicast multipath allow-multiple-as true
  set / network-instance default protocols bgp afi-safi ipv4-unicast multipath maximum-paths 64
  set / network-instance default protocols bgp neighbor 192.168.11.1 admin-state enable
  set / network-instance default protocols bgp neighbor 192.168.11.1 peer-as 201
  set / network-instance default protocols bgp neighbor 192.168.11.1 peer-group eBGP
  set / network-instance default protocols bgp neighbor 192.168.12.1 admin-state enable
  set / network-instance default protocols bgp neighbor 192.168.12.1 peer-as 202
  set / network-instance default protocols bgp neighbor 192.168.12.1 peer-group eBGP
  
  # iBGP config
  set / network-instance default protocols bgp group iBGP-overlay export-policy [ all ]
  set / network-instance default protocols bgp group iBGP-overlay import-policy [ all ]
  set / network-instance default protocols bgp group iBGP-overlay peer-as 100
  set / network-instance default protocols bgp group iBGP-overlay afi-safi ipv4-unicast admin-state disable
  set / network-instance default protocols bgp group iBGP-overlay afi-safi evpn admin-state enable
  set / network-instance default protocols bgp group iBGP-overlay local-as as-number 100
  set / network-instance default protocols bgp group iBGP-overlay timers minimum-advertisement-interval 1
  set / network-instance default protocols bgp group iBGP-overlay timers connect-retry 1
  
  set / network-instance default protocols bgp neighbor 10.0.2.1 peer-group iBGP-overlay
  set / network-instance default protocols bgp neighbor 10.0.2.1 transport local-address 10.0.1.1
  set / network-instance default protocols bgp neighbor 10.0.2.2 peer-group iBGP-overlay
  set / network-instance default protocols bgp neighbor 10.0.2.2 transport local-address 10.0.1.1
  
  # routing policy
  set / routing-policy prefix-set local prefix 172.17.11.0/24 mask-length-range 24..32
  set / routing-policy prefix-set local prefix 192.16.0.0/16 mask-length-range 16..32
  set / routing-policy prefix-set local prefix 10.0.0.0/16 mask-length-range 16..32
  set / routing-policy policy export-local statement 10 match prefix-set local
  set / routing-policy policy export-local statement 10 action policy-result accept
  set / routing-policy policy all default-action policy-result accept
  
  # tunnel interface
  set / tunnel-interface vxlan1 vxlan-interface 1 type bridged
  set / tunnel-interface vxlan1 vxlan-interface 1 ingress vni 1
  
  # mac vrf
  set / network-instance vrf-1 type mac-vrf
  set / network-instance vrf-1 admin-state enable
  set / network-instance vrf-1 interface ethernet-1/1.0
  set / network-instance vrf-1 interface ethernet-1/2.0
  set / network-instance vrf-1 interface ethernet-1/3.0
  set / network-instance vrf-1 interface ethernet-1/4.0
  set / network-instance vrf-1 vxlan-interface vxlan1.1
  
  set / network-instance vrf-1 protocols bgp-evpn bgp-instance 1 admin-state enable
  set / network-instance vrf-1 protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan1.1
  set / network-instance vrf-1 protocols bgp-evpn bgp-instance 1 evi 1
  set / network-instance vrf-1 protocols bgp-evpn bgp-instance 1 ecmp 2
  set / network-instance vrf-1 protocols bgp-vpn bgp-instance 1 route-target export-rt target:100:1
  set / network-instance vrf-1 protocols bgp-vpn bgp-instance 1 route-target import-rt target:100:1
  
  # remote logging
  set / system logging remote-server 172.80.80.45 transport udp
  set / system logging remote-server 172.80.80.45 remote-port 1514
  set / system logging remote-server 172.80.80.45 facility local6 priority match-above informational

