cluster_configs:
  hubble-gateway.yaml:
|
  apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    name: hubble-gateway
    namespace: kube-system
  spec:
    gatewayClassName: cilium
    listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
  ---
  apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    name: hubble-route
    namespace: kube-system
  spec:
    parentRefs:
    - name: hubble-gateway
    rules:
    - backendRefs:
      - name: hubble-ui
        port: 80

  kind-c1.yaml:
|
  kind: Cluster
  apiVersion: kind.x-k8s.io/v1alpha4
  networking:
    disableDefaultCNI: true
    podSubnet: "10.10.0.0/16"
    serviceSubnet: "10.11.0.0/16"
  nodes:
    - role: control-plane
    - role: worker
    - role: worker

  kind-c2.yaml:
|
  kind: Cluster
  apiVersion: kind.x-k8s.io/v1alpha4
  networking:
    disableDefaultCNI: true
    podSubnet: "10.20.0.0/16"
    serviceSubnet: "10.21.0.0/16"
  nodes:
    - role: control-plane
    - role: worker
    - role: worker

  kind-c3.yaml:
|
  kind: Cluster
  apiVersion: kind.x-k8s.io/v1alpha4
  networking:
    disableDefaultCNI: true
    podSubnet: "10.30.0.0/16"
    serviceSubnet: "10.31.0.0/16"
  nodes:
    - role: control-plane
    - role: worker
    - role: worker

testing_configs:
  backend-c2.yaml:
|
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: rebel-base
  spec:
    replicas: 2
    selector:
      matchLabels:
        name: rebel-base
    template:
      metadata:
        labels:
          name: rebel-base
      spec:
        containers:
        - name: app
          image: hashicorp/http-echo:latest
          args:
          - "-text=🚀 Greetings from Cluster 2!"
          - "-listen=:80"

  backend-c3.yaml:
|
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: rebel-base
  spec:
    replicas: 2
    selector:
      matchLabels:
        name: rebel-base
    template:
      metadata:
        labels:
          name: rebel-base
      spec:
        containers:
        - name: app
          image: hashicorp/http-echo:latest
          args:
          - "-text=🛸 Greetings from Cluster 3!"
          - "-listen=:80"

  global-service.yaml:
|
  apiVersion: v1
  kind: Service
  metadata:
    name: rebel-base
    annotations:
      service.cilium.io/global: "true"
  spec:
    type: ClusterIP
    ports:
    - port: 80
    selector:
      name: rebel-base

setup_script:
|
  #!/bin/bash
  
  echo "Configuring IPs for Cluster 1 (Leaf 1)..."
  docker exec c1-control-plane ip addr add 172.17.0.11/24 dev eth1
  docker exec c1-control-plane ip link set eth1 up
  docker exec c1-worker ip addr add 172.17.0.12/24 dev eth1
  docker exec c1-worker ip link set eth1 up
  docker exec c1-worker2 ip addr add 172.17.0.13/24 dev eth1
  docker exec c1-worker2 ip link set eth1 up
  
  echo "Configuring IPs for Cluster 2 (Leaf 2)..."
  docker exec c2-control-plane ip addr add 172.17.0.21/24 dev eth1
  docker exec c2-control-plane ip link set eth1 up
  docker exec c2-worker ip addr add 172.17.0.22/24 dev eth1
  docker exec c2-worker ip link set eth1 up
  docker exec c2-worker2 ip addr add 172.17.0.23/24 dev eth1
  docker exec c2-worker2 ip link set eth1 up
  
  echo "Configuring IPs for Cluster 3 (Leaf 3)..."
  docker exec c3-control-plane ip addr add 172.17.0.31/24 dev eth1
  docker exec c3-control-plane ip link set eth1 up
  docker exec c3-worker ip addr add 172.17.0.32/24 dev eth1
  docker exec c3-worker ip link set eth1 up
  docker exec c3-worker2 ip addr add 172.17.0.33/24 dev eth1
  docker exec c3-worker2 ip link set eth1 up
  
  echo "All Kind nodes successfully configured on the EVPN fabric!"
